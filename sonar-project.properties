# SonarCloud Configuration for Public Investment Projects
sonar.projectKey=EryckFCS_proyectos-inversion-publica-2026
sonar.organization=eryckfcs

# Paths to include in analysis
sonar.sources=src,scripts
sonar.tests=tests

# Paths to exclude from analysis
sonar.exclusions=data/**,scratch/**,docs/readings/**,docs/syllabus/**,reports/**,scripts/**,**/__pycache__/**,**/*.ipynb,**/*.csv,**/*.xlsx,**/*.pdf,**/*.dta,**/*.do

# Duplication exclusions
sonar.cpd.exclusions=tests/**

# Encoding
sonar.sourceEncoding=UTF-8

# Python specific settings
sonar.python.version=3.12,3.13

# Security Hotspot Ignores
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5144
sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S4830
sonar.issue.ignore.multicriteria.e2.resourceKey=src/**/*
