name: "Academic CI/CD Portafolio LPI"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Sync Dependencies
        run: uv sync

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 🛡️ Immunity Layer: Master Build Orchestration (Levels 4 & 5)
        run: |
          uv run python src/orchestration/M01-U1-PIP-Master_Build.py
        # Este paso unifica la validación de Integridad (Lineage) y Lógica (Pytest)
        # El build fallará si el MasterOrchestrator detecta cualquier anomalía.

      - name: 🧠 Phase 3: Knowledge Brain Sync
        run: |
          uv run python scripts/sync_brain.py

      - name: 📝 Phase 4: Quarto Rendering
        run: |
          quarto render

      - name: 🚀 Phase 4: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
