name: "Academic CI/CD Portafolio LPI"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  integrity:
    name: 🛡️ Architecture Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Run Architecture Tests
        run: uv tool run pytest tests/system/test_architecture.py

  build-and-deploy:
    name: 🧪 Build & Deploy
    needs: integrity
    runs-on: ubuntu-latest
    env:
      HAS_SECRET: ${{ secrets.GH_PAT != '' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Patch or Strip private dependency
        shell: bash
        run: |
          if [ "${{ env.HAS_SECRET }}" = "true" ]; then
            echo "✅ GH_PAT detected. Patching pyproject.toml for remote access."
            sed -i 's|path = "/home/erick-fcs/Capital_Workstation/capital-workstation-libs", editable = true|git = "https://${{ secrets.GH_PAT }}@github.com/EryckFCS/capital-workstation-libs.git"|g' pyproject.toml
          else
            echo "⚠️ GH_PAT not found. Stripping private dependency to allow sync of other tools."
            sed -i '/capital-workstation-libs/d' pyproject.toml
            sed -i '/capital-workstation-libs = { path =/d' pyproject.toml
          fi

      - name: Sync Dependencies
        run: uv sync

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false

      - name: 🛡️ Immunity Layer: Master Build Orchestration
        run: |
          if [ "${{ env.HAS_SECRET }}" = "true" ]; then
            uv run python src/orchestration/M01-U1-PIP-Master_Build.py
          else
            echo "⏭️ Skipping Master Build as private library is missing."
          fi

      - name: 📝 Phase 4: Quarto Rendering
        run: |
          quarto render

      - name: 🚀 Phase 4: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
